<!DOCTYPE html>
<html lang="en">
<head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <link rel="stylesheet" href="./form.css">
     <title>Sign Up</title>
</head>
<body>
  <form action="">
     <label for="fname">First Name :</label>
     <input type="text" placeholder="Enter the first name" id="fname"/><br>
     <br>
     <label for="lname">Last Name :</label>
     <input type="text" placeholder="Enter the last name" id="lname"/><br>
     <br>
     <label for="mobile">Mobile No. :</label>
     <input type="number" placeholder="Enter the mobile no" id="mobile"/><br>
     <br>
     <label for="adhar">Adhaar No. :</label>
     <input type="number" placeholder="Enter the mobile no" id="adhar"/><br>
     <br>
     <label for="em">Email :</label>
     <input type="email" placeholder="Enter the email " id="em"/><br>
     <br>
     <label for="dob">D.O.B :</label>
     <input type="datetime-local"  id="dob"/><br>
     <br>
     <label for="">Gender :</label>
     <input type="radio" name="sun"/><label>male</label>
     <input type="radio" name="sun"/><label>female</label>
     <input type="radio" name="sun"/><label>others</label><br><br>
     <label for="up">Upload Picture:</label>
     <input type="file"  id="up"/><br>
     <br>
     <label for="project">Projects link:</label>
     <input type="url"  id="project"/><br>
     <br>
     <label for="pass">Password:</label>
     <input type="password"  id="pass"/><br>
     <br>
     <input type="checkbox"><label for="">I have read terms and condition</label><br>
     <input type="checkbox"> <label for="">I am accepting terms and condition</label><br>
     <input type="range">
     <input type="color">
     <input type="reset">
     <input type="submit">

     <button>Sign Up</button>
     <button type="button">Cancel</button>
     <select name="" id="">
          <option value="" hidden>--Select--</option>
          <option value="">India</option>
          <option value="">America</option>
          <option value="">Sweden</option>
          <option value="">Germany</option>
     </select>
     <input type="text" disabled>
     <textarea name="" id=""></textarea>

     
  </form>   
</body>
</html>
